name: Daily Info Collect

on:
  schedule:
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: '查询天数'
        required: false
        default: '1'
      keyword:
        description: '关键词(逗号分隔)'
        required: false
        default: '反洗钱,模型,反诈,金融法,全面风险管理,操作风险管理,市场风险管理'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Chrome for Selenium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Run collector
        env:
          COLLECTOR_LLM_API_KEY: ${{ secrets.COLLECTOR_LLM_API_KEY }}
          COLLECTOR_GLM_API_KEY: ${{ secrets.COLLECTOR_GLM_API_KEY }}
          SPRING_MAIL_PASSWORD: ${{ secrets.SPRING_MAIL_PASSWORD }}
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          java -jar target/web-info-collector-1.0.0.jar \
            --run-once \
            --keyword=${{ github.event.inputs.keyword || '反洗钱,模型,反诈,金融法,全面风险管理,操作风险管理,市场风险管理' }} \
            --days=${{ github.event.inputs.days || '1' }} \
            --collector.llm.api-key=$COLLECTOR_LLM_API_KEY \
            --collector.llm.glm-api-key=$COLLECTOR_GLM_API_KEY \
            --spring.mail.password=$SPRING_MAIL_PASSWORD \
            --collector.notify.pushplus-token=$PUSHPLUS_TOKEN
