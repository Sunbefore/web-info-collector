server:
  port: 8083

spring:
  application:
    name: web-info-collector

  # 邮件配置（以QQ邮箱为例，其他邮箱修改host和port即可）
  mail:
    host: smtp.qq.com
    port: 465
    username: 928237051@qq.com
    password: ${SPRING_MAIL_PASSWORD:}  # QQ邮箱授权码，通过环境变量或local配置注入
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

# ======================== 采集系统配置 ========================
collector:
  # LLM 配置（支持多模型切换：qwen / glm）
  llm:
    provider: qwen  # 默认使用 qwen，可改为 glm
    # Qwen 配置
    api-url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
    # api-key: sk-your-dashscope-api-key    # 阿里云百炼平台 API Key（https://bailian.console.aliyun.com/）
    api-key: ${COLLECTOR_LLM_API_KEY:}    # 阿里云百炼平台 API Key，通过环境变量或local配置注入
    model: qwen3.5-plus                      # 推荐 qwen-plus（性价比高），也可用 qwen-turbo / qwen-max
    max-tokens: 4096                      # 最大输出 token 数
    temperature: 0.3                      # 低温度保证摘要准确性
    # GLM 配置（智谱 AI）
    glm-api-url: https://open.bigmodel.cn/api/paas/v4/chat/completions
    glm-api-key: ${COLLECTOR_GLM_API_KEY:}  # 智谱 AI API Key，通过环境变量或local配置注入
    glm-model: glm-5                    # 推荐 glm-5-plus，也可用 glm-4-plus

  # 通知配置
  notify:
    # 邮件收件人列表（多个用逗号分隔）
    mail-to:
    # 企业微信机器人 Webhook 地址（可选，留空则不推送微信）
    wechat-webhook: ""
    # PushPlus 个人微信推送 Token（可选，关注PushPlus公众号获取）
    pushplus-token: ${PUSHPLUS_TOKEN:}  # PushPlus Token，通过环境变量或local配置注入

  # 定时任务 Cron 表达式（默认每天早上 8:30 执行）
  schedule:
    cron: "0 0 6 * * ?"

  # 爬虫配置
  crawler:
    # 请求超时时间（毫秒）
    timeout: 30000
    # 请求间隔（毫秒），避免被封IP
    request-interval: 2000
    # 最大抓取文章数（每个网站）
    max-articles-per-site: 20
    # User-Agent
    user-agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"

  # 需要监控的网站列表（可在此预配置，也可通过 API 动态添加）
  sites:
    - name: 国家金融监督管理总局
      url: https://www.nfra.gov.cn
      # 使用API模式（该网站为AngularJS动态渲染，Jsoup无法直接解析）
      api-mode: true
      api-url: https://www.nfra.gov.cn/cbircweb/DocInfo/SelectDocByItemIdAndChild
      detail-url-template: "https://www.nfra.gov.cn/cn/view/pages/ItemDetail.html?docId={docId}&itemId={itemId}"
      content-selector: ".Section_content"
      api-items:
        - name: 监管动态
          item-id: 915
        - name: 领导活动及讲话
          item-id: 919
        - name: 新闻发布会及访谈
          item-id: 920
        - name: 政策解读
          item-id: 916
      enabled: true

    - name: 中国人民银行反洗钱局
      url: https://www.pbc.gov.cn/fanxiqianju/135153/index.html
      # HTML模式 + 多栏目子页面
      # 注意：不同栏目使用不同的HTML结构，需要同时匹配两种模式
      # td.unline: 工作信息等页面
      # td[height=22][align=left]: 法规政策等页面（包含font.newslist_style）
      list-selector: "td.unline, td[height=22][align=left]"
      title-selector: "a"
      link-selector: "a"
      date-selector: "span.hui12"
      date-format: "yyyy-MM-dd"
      content-selector: "#zoom"
      next-page-selector: "a.pagingNormal:contains(下一页)"
      sub-pages:
        - name: 工作信息
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135155/index.html
        - name: 法规政策
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135173/index.html
        - name: 反洗钱工作部际联席会议
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135159/index.html
        - name: 反洗钱监督管理
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135163/index.html
        - name: 反洗钱调查与案件查处
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135178/index.html
        - name: 国际合作与交流-交流与合作
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135241/135244/index.html
        - name: 国际合作与交流-国际评估
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135241/135247/index.html
        - name: 国际合作与交流-国际标准
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135241/135250/index.html
        - name: 国际合作与交流-其他
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135241/135253/index.html
        - name: 风险提示与金融制裁
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135267/index.html
        - name: 反洗钱报告
          url: https://www.pbc.gov.cn/fanxiqianju/135153/135282/index.html
      enabled: true

    - name: 中华人民共和国财政部
      url: http://www.mof.gov.cn
      # HTML模式 + 多栏目子页面 + URL模式翻页
      # 注意：不同页面使用不同的选择器
      # ul.xwfb_listbox > li: 主页面（财政新闻等）
      # ul.xwbd_lianbolistfrcon > li: 子页面（通知公告等）
      list-selector: "ul.xwfb_listbox > li, ul.xwbd_lianbolistfrcon > li"
      title-selector: "a"
      link-selector: "a"
      date-selector: "span"
      date-format: "yyyy-MM-dd"
      content-selector: ".TRS_Editor"
      next-page-pattern: "index_{page}.htm"
      sub-pages:
        - name: 时政要闻
          json-url: https://www.gov.cn/pushinfo/v150203/pushinfo.json
          json-title-field: title
          json-link-field: link
          json-date-field: pubDate
        - name: 财政新闻
          url: http://www.mof.gov.cn/zhengwuxinxi/caizhengxinwen/
        - name: 政策发布
          url: http://www.mof.gov.cn/zhengwuxinxi/zhengcefabu/
        - name: 政策解读
          url: http://www.mof.gov.cn/zhengwuxinxi/zhengcejiedu/
        - name: 财经视点
          url: http://www.mof.gov.cn/zhengwuxinxi/caijingshidian/zyzfmhwz/
        - name: 财经论坛
          url: http://www.mof.gov.cn/gkml/diaochayanjiu/
        - name: 通知公告
          url: http://www.mof.gov.cn/gkml/bulinggonggao/tongzhitonggao/
        - name: 全国财政新闻联播
          url: http://www.mof.gov.cn/zhengwuxinxi/xinwenlianbo/
      enabled: true

    - name: 中央纪委国家监委网站-头条
      url: https://www.ccdi.gov.cn
      # 新闻头条：li > a + span 结构
      # 网站有验证码保护，- 难以绑过，      list-selector: "ul.list_news_dl > li"
      title-selector: "a"
      link-selector: "a"
      date-selector: "span"
      date-format: "yyyy-MM-dd"
      content-selector: ".Article_61 .content"
      next-page-pattern: "index_{page}.html"
      sub-pages:
        - name: 新闻头条
          url: https://www.ccdi.gov.cn/toutiaon/
      enabled: false

    - name: 中央纪委国家监委网站
      url: https://www.ccdi.gov.cn
      # 要闻及工作动态：div.title > a, div.more 结构
      # 网站有验证码保护
      list-selector: "ul.list_news_dl2 > li"
      title-selector: "div.title a"
      link-selector: "div.title a"
      date-selector: "div.more"
      date-format: "yyyy-MM-dd"
      content-selector: ".Article_61 .content"
      next-page-pattern: "index_{page}.html"
      sub-pages:
        - name: 要闻
          url: https://www.ccdi.gov.cn/yaowenn/
        - name: 监督检查
          url: https://www.ccdi.gov.cn/gzdtn/jdjc/
        - name: 党风政风
          url: https://www.ccdi.gov.cn/gzdtn/dfzf/
        - name: 巡视巡察
          url: https://www.ccdi.gov.cn/xsxcn/
        - name: 组织建设
          url: https://www.ccdi.gov.cn/gzdtn/zzjs/
        - name: 国际合作
          url: https://www.ccdi.gov.cn/gzdtn/gjhz/
        - name: 基层风采
          url: https://www.ccdi.gov.cn/gzdtn/jcfc/
      enabled: false

    - name: 中国邮政集团
      url: https://www.chinapost.com.cn
      # HTML模式 + 多栏目子页面 + 下一页按钮翻页
      list-selector: "div.new_list ul > li"
      title-selector: "span#ReportIDname a"
      link-selector: "span#ReportIDname a"
      date-selector: "span#ReportIDIssueTime"
      date-format: "yyyy-MM-dd"
      content-selector: ".new_text span#ReportIDtext"
      next-page-selector: "a#CBNext"
      sub-pages:
        - name: 时政要闻
          url: https://www.chinapost.com.cn/html1/category/24051/127-1.htm
        - name: 集团要闻
          url: https://www.chinapost.com.cn/html1/category/181312/8238-1.htm
        - name: 综合新闻
          url: https://www.chinapost.com.cn/html1/category/181312/8239-1.htm
        - name: 媒体聚焦
          url: https://www.chinapost.com.cn/html1/category/181312/8240-1.htm
        - name: 党建动态
          url: https://www.chinapost.com.cn/html1/category/181312/8241-1.htm
        - name: 普遍服务
          url: https://www.chinapost.com.cn/html1/category/181312/8242-1.htm
        - name: 科技创新
          url: https://www.chinapost.com.cn/html1/category/181312/8243-1.htm
        - name: 企业文化
          url: https://www.chinapost.com.cn/html1/category/181312/8244-1.htm
        - name: 一线风采
          url: https://www.chinapost.com.cn/html1/category/181312/8245-1.htm
        - name: 集邮报道
          url: https://www.chinapost.com.cn/html1/category/181312/8255-1.htm
      enabled: true

logging:
  level:
    com.info.collector: DEBUG
    org.apache.pdfbox: ERROR
  file:
    name: logs/web-info-collector.log
